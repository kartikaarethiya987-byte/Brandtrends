<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Trends – Exclusive Men's Wear | Kharghar, Navi Mumbai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════
   ROOT VARIABLES
══════════════════════════════════════ */
:root {
  --gold:       #C9A84C;
  --gold-light: #E8C97A;
  --gold-dark:  #9B7B2E;
  --black:      #090909;
  --dark:       #101010;
  --dark2:      #181818;
  --dark3:      #202020;
  --white:      #F4EFE6;
  --white2:     #DDD5C4;
  --gray:       #888070;
  --font-head:  'Cormorant Garamond', Georgia, serif;
  --font-body:  'Montserrat', Arial, sans-serif;
}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--black); color: var(--white); font-family: var(--font-body); overflow-x: hidden; line-height: 1.6; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

/* ══════════════════════════════════════
   NAVBAR
══════════════════════════════════════ */
#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  height: 80px;
  transition: background 0.4s, height 0.4s, border 0.4s;
}
#navbar.scrolled {
  background: rgba(9,9,9,0.96);
  backdrop-filter: blur(16px);
  height: 64px;
  border-bottom: 1px solid rgba(201,168,76,0.2);
}

/* Logo */
.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
}
.logo-box {
  width: 56px;
  height: 56px;
  border: 2px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
  transition: transform 0.3s;
}
.logo-box:hover { transform: rotate(3deg) scale(1.05); }
.logo-box::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(201,168,76,0.35);
}
.logo-letter {
  font-family: var(--font-head);
  font-size: 30px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  position: relative;
  z-index: 1;
}
.logo-text { display: flex; flex-direction: column; line-height: 1.15; }
.logo-name {
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--white);
}
.logo-sub {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
}

/* Nav links */
.nav-links {
  display: flex;
  align-items: center;
  gap: 36px;
}
.nav-links a {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--white2);
  position: relative;
  transition: color 0.3s;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -5px; left: 0;
  width: 0; height: 1px;
  background: var(--gold);
  transition: width 0.3s;
}
.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { width: 100%; }
.nav-links .nav-cta {
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 9px 22px;
  transition: background 0.3s, color 0.3s;
}
.nav-links .nav-cta::after { display: none; }
.nav-links .nav-cta:hover { background: var(--gold); color: var(--black); }

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.hamburger span {
  display: block;
  width: 26px;
  height: 2px;
  background: var(--white);
  border-radius: 2px;
  transition: all 0.3s;
}

/* Mobile Menu */
#mobileMenu {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--black);
  z-index: 950;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
}
#mobileMenu.open { display: flex; }
#mobileMenu a {
  font-family: var(--font-head);
  font-size: 40px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--white);
  transition: color 0.3s;
}
#mobileMenu a:hover { color: var(--gold); }
.mob-close {
  position: absolute;
  top: 22px; right: 5%;
  background: none;
  border: none;
  color: var(--white);
  font-size: 32px;
  cursor: pointer;
  line-height: 1;
}

/* ══════════════════════════════════════
   HERO
══════════════════════════════════════ */
#hero {
  position: relative;
  height: 100vh;
  min-height: 680px;
  display: flex;
  align-items: center;
  overflow: hidden;
}
.hero-img {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(120deg, rgba(9,9,9,0.88) 0%, rgba(9,9,9,0.45) 55%, rgba(9,9,9,0.72) 100%),
    url('https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=1800&q=85') center/cover no-repeat;
  transform: scale(1.06);
  animation: heroZoom 10s ease forwards;
}
@keyframes heroZoom { to { transform: scale(1); } }

.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.05) 1px, transparent 1px);
  background-size: 64px 64px;
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 0 8%;
  max-width: 820px;
}

.hero-tag {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
  opacity: 0;
  animation: slideUp 0.7s 0.4s forwards;
}
.hero-tag-line { width: 44px; height: 1px; background: var(--gold); }
.hero-tag-text { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); font-weight: 600; }

.hero-h1 {
  font-family: var(--font-head);
  font-size: clamp(54px, 9vw, 108px);
  font-weight: 300;
  line-height: 0.95;
  letter-spacing: -1px;
  margin-bottom: 20px;
  opacity: 0;
  animation: slideUp 0.8s 0.6s forwards;
}
.hero-h1 em {
  display: block;
  font-style: italic;
  font-weight: 600;
  color: var(--gold);
}

.hero-sub {
  font-size: 11px;
  letter-spacing: 4.5px;
  text-transform: uppercase;
  color: var(--white2);
  margin-bottom: 48px;
  opacity: 0;
  animation: slideUp 0.7s 0.8s forwards;
}

.hero-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  opacity: 0;
  animation: slideUp 0.7s 1s forwards;
}

.btn-gold {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--gold);
  color: var(--black);
  padding: 17px 40px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.3s, transform 0.3s;
}
.btn-gold::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gold-light);
  transform: translateX(-101%);
  transition: transform 0.35s;
}
.btn-gold span { position: relative; z-index: 1; }
.btn-gold:hover { box-shadow: 0 0 32px rgba(201,168,76,0.55); transform: translateY(-2px); }
.btn-gold:hover::before { transform: translateX(0); }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  border: 1px solid rgba(255,255,255,0.35);
  color: var(--white);
  padding: 17px 40px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  transition: border-color 0.3s, color 0.3s;
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

.hero-scroll-hint {
  position: absolute;
  bottom: 38px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: fadeIn 1s 1.6s forwards;
}
.hero-scroll-hint span { font-size: 8px; letter-spacing: 3.5px; text-transform: uppercase; color: var(--gray); }
.scroll-bar {
  width: 1px; height: 52px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  animation: scrollPulse 2.2s ease-in-out infinite;
}

/* ══════════════════════════════════════
   SHARED SECTION STYLES
══════════════════════════════════════ */
.sec { padding: 100px 8%; }
.sec-label {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px;
}
.sec-label-line { width: 32px; height: 1px; background: var(--gold); }
.sec-label-text { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); font-weight: 600; }
.sec-title {
  font-family: var(--font-head);
  font-size: clamp(38px, 5vw, 68px);
  font-weight: 300;
  line-height: 1.08;
  margin-bottom: 16px;
}
.sec-title em { font-style: italic; font-weight: 700; color: var(--gold); }
.sec-sub { font-size: 12px; color: var(--gray); max-width: 520px; line-height: 1.85; letter-spacing: 0.3px; }

/* Scroll reveal */
.reveal {
  opacity: 0;
  transform: translateY(36px);
  transition: opacity 0.75s ease, transform 0.75s ease;
}
.reveal.on { opacity: 1; transform: translateY(0); }

/* ══════════════════════════════════════
   COLLECTIONS
══════════════════════════════════════ */
#collections { background: var(--dark); }

.coll-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  margin-top: 56px;
}
.coll-card {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  aspect-ratio: 3/4;
}
.coll-card:first-child {
  grid-column: 1 / 3;
  aspect-ratio: 16/9;
}
.coll-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.62);
  transition: transform 0.7s cubic-bezier(.25,.46,.45,.94), filter 0.5s;
}
.coll-card:hover img { transform: scale(1.09); filter: brightness(0.38); }
.coll-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 26px 28px;
  background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%);
  transition: padding 0.4s;
}
.coll-card:hover .coll-info { padding-bottom: 60px; }
.coll-tag { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
.coll-name { font-family: var(--font-head); font-size: 28px; font-weight: 700; }
.coll-hover {
  position: absolute;
  bottom: 22px; left: 28px;
  opacity: 0;
  transition: opacity 0.4s;
}
.coll-card:hover .coll-hover { opacity: 1; }
.view-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); font-weight: 600;
  border-bottom: 1px solid var(--gold);
  padding-bottom: 2px;
  background: none; border-top: none; border-left: none; border-right: none;
  cursor: pointer;
  font-family: var(--font-body);
}

/* ══════════════════════════════════════
   TRADITIONAL WEAR
══════════════════════════════════════ */
#traditional { background: var(--black); padding-top: 20px; }

.trad-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 3px;
  margin-top: 56px;
}
.trad-card {
  position: relative;
  overflow: hidden;
  aspect-ratio: 2/3;
  cursor: pointer;
}
.trad-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.65) saturate(0.9);
  transition: transform 0.65s ease, filter 0.5s;
}
.trad-card:hover img { transform: scale(1.07); filter: brightness(0.42); }
.trad-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 22px 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}
.trad-sub { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
.trad-name { font-family: var(--font-head); font-size: 22px; font-weight: 700; }
.trad-num {
  position: absolute;
  top: 14px; right: 14px;
  font-family: var(--font-head);
  font-size: 52px; font-weight: 900;
  color: rgba(201,168,76,0.12);
  line-height: 1;
}
.trad-cta { text-align: center; margin-top: 40px; }

/* ══════════════════════════════════════
   WHY US
══════════════════════════════════════ */
#why-us {
  background: radial-gradient(ellipse at 25% 50%, rgba(201,168,76,0.07) 0%, transparent 60%), var(--dark);
}
.why-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 3px;
  margin-top: 56px;
}
.why-card {
  background: var(--dark2);
  padding: 48px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.4s, background 0.4s;
}
.why-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform 0.4s;
}
.why-card:hover { transform: translateY(-5px); background: var(--dark3); }
.why-card:hover::after { transform: scaleX(1); }
.why-icon { font-size: 32px; margin-bottom: 20px; display: block; }
.why-title { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; color: var(--white); }
.why-desc { font-size: 12px; color: var(--gray); line-height: 1.75; }

/* ══════════════════════════════════════
   STYLE INSPIRATION
══════════════════════════════════════ */
#inspiration { background: var(--dark); }
.inspo-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 56px;
}
.inspo-card {
  position: relative;
  overflow: hidden;
  aspect-ratio: 2/3;
  cursor: pointer;
}
.inspo-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.65) saturate(0.85);
  transition: transform 0.65s ease, filter 0.5s;
}
.inspo-card:hover img { transform: scale(1.06) rotate(0.8deg); filter: brightness(0.42); }
.inspo-num {
  position: absolute;
  top: 14px; right: 14px;
  font-family: var(--font-head);
  font-size: 56px; font-weight: 900;
  color: rgba(201,168,76,0.13);
  line-height: 1;
}
.inspo-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 22px 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.88), transparent);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s, transform 0.4s;
}
.inspo-card:hover .inspo-info { opacity: 1; transform: translateY(0); }
.inspo-lbl { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
.inspo-nm { font-family: var(--font-head); font-size: 22px; font-weight: 700; }

/* ══════════════════════════════════════
   OCCASIONS
══════════════════════════════════════ */
#occasions { background: var(--black); }
.occ-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  margin-top: 56px;
}
.occ-card {
  position: relative;
  overflow: hidden;
  aspect-ratio: 4/5;
  cursor: pointer;
}
.occ-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.5) saturate(0.8);
  transition: transform 0.7s ease, filter 0.5s;
}
.occ-card:hover img { transform: scale(1.07); filter: brightness(0.3); }
.occ-info {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 36px 32px;
  background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.15) 65%, transparent 100%);
}
.occ-tag { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.occ-title { font-family: var(--font-head); font-size: 36px; font-weight: 700; line-height: 1.1; margin-bottom: 14px; }
.occ-line {
  width: 40px; height: 1px; background: var(--gold); margin-bottom: 14px;
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.5s 0.1s;
}
.occ-card:hover .occ-line { transform: scaleX(1); }
.occ-desc {
  font-size: 11px; color: var(--white2); letter-spacing: 0.4px;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.4s 0.1s, transform 0.4s 0.1s;
}
.occ-card:hover .occ-desc { opacity: 1; transform: translateY(0); }

/* ══════════════════════════════════════
   OFFERS / STATS
══════════════════════════════════════ */
#offers {
  background: var(--gold);
  position: relative;
  overflow: hidden;
}
#offers::before {
  content: 'BRAND TRENDS';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-head);
  font-size: 18vw;
  font-weight: 900;
  color: rgba(0,0,0,0.06);
  white-space: nowrap;
  pointer-events: none;
}
.ticker-wrap {
  overflow: hidden;
  border-top: 1px solid rgba(0,0,0,0.18);
  border-bottom: 1px solid rgba(0,0,0,0.18);
  padding: 13px 0;
  position: relative;
  z-index: 1;
}
.ticker-track {
  display: flex;
  width: max-content;
  animation: ticker 22s linear infinite;
}
.ticker-track span {
  font-size: 10px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--black);
  padding: 0 36px;
  display: flex; align-items: center; gap: 20px;
}
.ticker-track span::after { content: '◆'; font-size: 7px; opacity: 0.5; }

.stats-outer { padding: 60px 8% 80px; position: relative; z-index: 1; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
}
.stat-item {
  background: rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.1);
  padding: 48px 32px;
  text-align: center;
}
.stat-big {
  font-family: var(--font-head);
  font-size: 80px; font-weight: 700;
  color: var(--black);
  line-height: 1;
  margin-bottom: 8px;
  display: flex; align-items: baseline; justify-content: center; gap: 3px;
}
.stat-big sup { font-size: 36px; }
.stat-big .sfx { font-size: 48px; }
.stat-lbl { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,0,0,0.55); font-weight: 700; }

/* ══════════════════════════════════════
   LOCATION
══════════════════════════════════════ */
#location { background: var(--dark); }
.loc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
  margin-top: 56px;
}
.loc-map {
  position: relative;
  min-height: 460px;
}
.loc-map iframe {
  position: absolute;
  inset: 0; width: 100%; height: 100%;
  border: none;
  filter: grayscale(0.2) contrast(1.05);
}
.loc-info {
  background: var(--dark2);
  padding: 48px 44px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 28px;
}
.loc-detail {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}
.loc-icon {
  width: 42px; height: 42px;
  border: 1px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; color: var(--gold);
  flex-shrink: 0;
  transition: border-color 0.3s, background 0.3s;
}
.loc-detail:hover .loc-icon { border-color: var(--gold); background: rgba(201,168,76,0.08); }
.loc-dl-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
.loc-dl-text { font-size: 13px; color: var(--white2); line-height: 1.65; }
.loc-dl-text a { color: var(--white2); transition: color 0.3s; }
.loc-dl-text a:hover { color: var(--gold); }

.btn-dir {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 16px 34px;
  font-size: 10px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  transition: background 0.3s, color 0.3s, transform 0.3s, box-shadow 0.3s;
  animation: bounceBtn 2.5s ease-in-out 2s infinite;
  width: fit-content;
}
.btn-dir:hover {
  background: var(--gold); color: var(--black);
  animation: none; transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(201,168,76,0.3);
}

.store-pics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
  margin-top: 3px;
  height: 280px;
}
.store-pics img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.65);
  transition: filter 0.4s, transform 0.5s;
}
.store-pics img:hover { filter: brightness(0.9); transform: scale(1.02); }
